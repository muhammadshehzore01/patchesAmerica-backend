[supervisord]
nodaemon=true
logfile=/dev/null
user=root

[program:daphne]
command=daphne -b 0.0.0.0 -p 8000 backend.asgi:application
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:gunicorn]
command=gunicorn backend.wsgi:application --bind 0.0.0.0:8001 --workers 3
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
